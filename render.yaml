# Blueprint de deploy no Render (https://render.com).
# Cria um Web Service Node + um PostgreSQL gerenciado.
#
# Como usar:
#   1. Faça push deste repositório para o GitHub.
#   2. No Render: New > Blueprint > selecione o repositório.
#   3. Defina a variável GEMINI_API_KEY (sync:false) no painel do serviço.
#   O DATABASE_URL e o JWT_SECRET são preenchidos automaticamente.

services:
  - type: web
    name: falainstrutor
    runtime: node
    plan: free
    branch: main
    autoDeploy: true # deploy automático a cada push na branch main
    buildCommand: npm install && npx prisma generate && npm run build
    # Aplica migrações + seed (idempotente) e sobe o servidor. Feito no start
    # para funcionar também no plano gratuito (onde preDeployCommand não roda).
    # IMPORTANTE: se migrate/seed falharem, o servidor sobe MESMO ASSIM — assim o
    # site fica acessível e não entra em loop de "finalizing startup".
    startCommand: (npx prisma migrate deploy && npx prisma db seed) || echo "init falhou — iniciando o servidor mesmo assim"; npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL: por padrão usa o Postgres gerenciado do Render (abaixo).
      # Para usar a Neon (grátis e que NÃO expira), basta editar esta variável no
      # painel (Environment) e colar a connection string da Neon. Passo a passo
      # em docs/NEON-SETUP.md. (Nenhuma mudança de código é necessária.)
      - key: DATABASE_URL
        fromDatabase:
          name: falainstrutor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # Senha inicial do admin no seed (troque após o primeiro deploy).
      - key: ADMIN_PASSWORD
        sync: false
      # --- Pagamentos (Asaas) ---
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_ENV
        value: sandbox
      - key: ASAAS_WEBHOOK_TOKEN
        generateValue: true
      # --- Assinatura digital ICP-Brasil (certificado A1 .pfx) ---
      # NUNCA versione o .pfx nem a senha. Defina estas variáveis apenas no
      # painel do Render. ICP_PFX_BASE64 = saída de `base64 -w0 certificado.pfx`.
      - key: ICP_PFX_BASE64
        sync: false
      - key: ICP_PFX_PASSWORD
        sync: false
      # E-mails transacionais (Resend). Opcionais: sem eles, o envio é apenas
      # registrado no log e nada quebra.
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # PUBLIC_URL não é necessária: o Render injeta RENDER_EXTERNAL_URL
      # (URL https completa), já usada pelo servidor para retornos e webhook.

databases:
  - name: falainstrutor-db
    plan: free
