name: Build APK Android

# Gera o APK instalável do app FalaInstrutor na nuvem (sem Android Studio).
#
# Como usar:
#   1. Aba "Actions" do repositório no GitHub
#   2. Workflow "Build APK Android" -> botão "Run workflow"
#   3. Confirme a URL do backend (padrão: produção) e rode
#   4. Ao terminar, baixe o artefato "FalaInstrutor-APK" e instale no celular
#
# O APK é assinado com a chave de DEBUG: instala em qualquer aparelho com
# "Instalar apps de fontes desconhecidas" habilitado. Para a Play Store é
# necessário um APK/AAB assinado com keystore de release (ver ANDROID-APP.md).

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'URL pública do backend que o app vai consumir'
        required: true
        default: 'https://falainstrutor.onrender.com'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web (Vite) apontando para o backend
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url }}
        run: npm run build

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Aceitar licenças do Android SDK
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true

      - name: Build APK (debug, instalável)
        run: |
          echo "Android SDK em: ${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload do APK (artefato)
        uses: actions/upload-artifact@v4
        with:
          name: FalaInstrutor-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publicar APK em Release (download direto, sem login)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk FalaInstrutor.apk
          gh release delete app-android -y --cleanup-tag 2>/dev/null || true
          gh release create app-android FalaInstrutor.apk \
            --title "FalaInstrutor — App Android (APK)" \
            --notes "APK instalável mais recente. Baixe no celular e instale (autorize 'fontes desconhecidas'). Aponta para o backend de produção."
