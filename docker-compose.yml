# Sobe um PostgreSQL local para desenvolvimento/teste com um comando:
#   docker compose up -d
# Depois configure DATABASE_URL no .env apontando para localhost:5432.

services:
  db:
    image: postgres:16-alpine
    container_name: falainstrutor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: falainstrutor
    ports:
      - '5432:5432'
    volumes:
      - fi_pgdata:/var/lib/postgresql/data

volumes:
  fi_pgdata:
